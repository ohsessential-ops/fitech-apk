name: Build FiTech APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      - name: Extract reviewed FiTech project
        shell: bash
        run: |
          rm -rf build-source
          mkdir build-source
          unzip -q FiTech_Dedicated_Project_v1.3.1-portable.zip -d build-source

          PROJECT_DIR="$(dirname "$(find build-source -name pubspec.yaml -print -quit)")"

          if [ -z "$PROJECT_DIR" ]; then
            echo "FiTech pubspec.yaml was not found"
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project found at: $PROJECT_DIR"

      - name: Generate Android files
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          flutter create --platforms=android --org com.fitech .

          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          content = manifest.read_text(encoding="utf-8")
          content = content.replace(
              'android:label="fitech"',
              'android:label="FiTech"',
          )
          manifest.write_text(content, encoding="utf-8")
          PY

      - name: Install packages
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          flutter clean
          flutter pub get

      - name: Generate FiTech launcher icon
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          dart run flutter_launcher_icons

      - name: Run source quality gate
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python3 tools/quality_gate.py

      - name: Analyze project
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run automated tests
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          flutter test

      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          flutter build apk --debug

      - name: Build release APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          flutter build apk --release

      - name: Upload APK files
        uses: actions/upload-artifact@v4
        with:
          name: FiTech-v1.3.1-Android-APKs
          path: |
            ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
            ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
